apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-node
  labels:
    app: auth-service-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service-node
  template:
    metadata:
      labels:
        app: auth-service-node
    spec:
      initContainers:
        - name: auth-migrate
          image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - "npx sequelize-cli db:migrate"
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: name
      containers:
        - name: auth-service
          image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: auth-db
                  key: name
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-jwt
                  key: private-key
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-jwt
                  key: public-key
            - name: JWT_ACCESS_TTL
              value: "900"
            - name: JWT_REFRESH_TTL
              value: "2592000"
            - name: JWT_ISSUER
              value: "auth-service"
            - name: JWT_AUDIENCE
              value: "crm-api"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth-google
                  key: client-id
            - name: CORS_ORIGIN
              value: "https://tudominio.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
